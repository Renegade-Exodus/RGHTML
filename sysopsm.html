<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINCE 2003: THE OFFICIAL HOME OF RENEGADE BBS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="templatemo-nexaverse.css">

<style>
  :root { --title-width: 900px; }

  body {
    background:#000;
    color:rgba(255,255,255,.85);
    font-family:'Outfit',system-ui,sans-serif;
    margin:0;
    overflow-x:hidden;
  }
  img{max-width:100%;height:auto;}

  .back-wrap{
    position:fixed;
    top:20px;
    right:20px;
    z-index:1000;
  }

  .back-btn{
    display:inline-block;
    padding:10px 18px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05);
    color:rgba(255,255,255,.9);
    text-decoration:none;
    font-weight:800;
  }
  .back-btn:hover{
    background:rgba(0,255,255,.22);
    border-color:rgba(0,255,255,.4);
    box-shadow:0 0 0 4px rgba(0,255,255,.18);
  }

  /* Button row */
  .button-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 25px 0 8px;
  }

  .yellow-text {
    text-align: center;
    color: #ffff00;
    font-size: 18px;
    font-weight: 600;
    margin: 4px 0 25px;
    text-shadow: 0 0 8px rgba(255,255,0,0.5);
  }

  /* ====================== GALLERY ====================== */
  .gallery{
    position: relative;
    margin: 15px auto 0;
    max-width: 980px;
    width: 100%;
    padding: 0 10px;
  }

  .gallery-controls {
    display: flex;
    justify-content: space-between;     /* Allows centering of text */
    align-items: center;
    max-width: 980px;
    margin: 0 auto 12px;
    padding: 0 10px;
  }

  .gallery-nav{
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.92);
    font-size: 28px;
    cursor: pointer;
    transition: all .12s ease;
    flex-shrink: 0;
  }

  .gallery-nav:hover{
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.3);
    transform: translateY(-2px);
  }

  .gallery-instruction {
    color: rgba(255,255,255,.85);
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    flex: 1;
    padding: 0 20px;
  }

  .gallery .gallery-stage{
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.45);
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
    cursor: default;
  }

  .gallery .gallery-stage img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
</style>

</head>
<body>
<div class="back-wrap">
  <a href="betaindex.html" class="back-btn">← Back to Menu</a>
</div>

<div class="button-row">
  <a href="https://paypal.me/renegadebbs?country.x=US&locale.x=en_US" target="_blank" rel="noopener">
    <img src="images/donate.png" alt="SysOp Smashin' Donation" width="200" height="90">
  </a>
  <a href="zip/SYSOPV01.ZIP" download>
    <img src="images/download.png" alt="SysOp Smashin' Download" width="200" height="90">
  </a>
  <a href="mailto:e@rgbbs.info">
    <img src="images/email.png" alt="SysOp Smashin' E-Mail" width="200" height="90">
  </a>
</div>

<p class="yellow-text">
  If you donate, please click the email link above and let me know how to reach you.
</p>

<div class="gallery">
  <div class="gallery-controls">
    <button type="button" class="gallery-nav prev" id="galleryPrev" aria-label="Previous screenshot">‹</button>
    
    <div class="gallery-instruction">
      Click the ◀ or ▶ buttons to scroll through the game images.
    </div>

    <button type="button" class="gallery-nav next" id="galleryNext" aria-label="Next screenshot">›</button>
  </div>

  <div class="gallery-stage" id="galleryStage">
    <img id="galleryMainImg" src="images/sysopsm.png" alt="SysOp Smashin' screenshots">
  </div>
</div>

<script>
// Gallery images list
const galleryImages = [
  "images/sysopsm.png",
  "images/sysopsm1.png",
  "images/sysopsm2.png",
  "images/sysopsm3.png",
  "images/sysopsm4.png",
  "images/sysopsm5.png",
  "images/sysopsm6.png",
  "images/sysopsm7.png",
  "images/sysopsm8.png",
  "images/sysopsm9.png",
  "images/sysopsm0.png"
];

let currentIndex = 0;

const mainImg = document.getElementById('galleryMainImg');
const prevBtn = document.getElementById('galleryPrev');
const nextBtn = document.getElementById('galleryNext');

function updateMainImage() {
  mainImg.src = galleryImages[currentIndex];
}

function goToPrev() {
  currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
  updateMainImage();
}

function goToNext() {
  currentIndex = (currentIndex + 1) % galleryImages.length;
  updateMainImage();
}

function initGallery() {
  prevBtn.addEventListener('click', goToPrev);
  nextBtn.addEventListener('click', goToNext);

  // Keyboard support - arrows only
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goToPrev();
    else if (e.key === 'ArrowRight') goToNext();
  });

  updateMainImage();
}

document.addEventListener('DOMContentLoaded', initGallery);
</script>

</body>
</html>
